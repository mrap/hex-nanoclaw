# config/event-catalog.yaml
# Single source of truth for event types in the NanoClaw system.
# Mounted read-only into all containers. Agents reference this to know what to emit.

events:
  # --- System lifecycle ---
  system.started:
    description: "NanoClaw process started"
    payload:
      timestamp: "string"
    emit_when: "Automatic on startup"

  system.shutdown:
    description: "NanoClaw process shutting down"
    payload:
      timestamp: "string"
    emit_when: "Automatic on shutdown"

  # --- Container lifecycle ---
  container.started:
    description: "A container agent started running"
    payload:
      group: "string"
      task_id: "string or null"
    emit_when: "Automatic when container starts"

  container.exit:
    description: "A container agent finished"
    payload:
      group: "string"
      exit_code: "number"
      duration_ms: "number"
    emit_when: "Automatic when container exits"

  # --- Task lifecycle ---
  task.completed:
    description: "An agent completed an assigned task"
    payload:
      group: "string"
      task_id: "string"
      result: "string or null"
    emit_when: "After you have completed a task and want to signal the system"

  task.failed:
    description: "An agent failed to complete a task"
    payload:
      group: "string"
      task_id: "string"
      error: "string"
    emit_when: "When a task fails and you want the system to know"

  task.scheduled:
    description: "A new task was scheduled by a policy action"
    payload:
      task_id: "string"
      group: "string"
      trigger_policy: "string"
    emit_when: "When a schedule action creates a task"

  # --- BOI integration ---
  boi.spec.completed:
    description: "A BOI spec finished execution"
    payload:
      spec_id: "string"
      target_repo: "string"
      status: "string"
    emit_when: "Emitted by BOI completion hooks"

  boi.spec.failed:
    description: "A BOI spec failed"
    payload:
      spec_id: "string"
      target_repo: "string"
      error: "string"
    emit_when: "Emitted by BOI failure hooks"

  # --- Review ---
  review.requested:
    description: "Code review requested for output"
    payload:
      spec_id: "string"
      repo: "string"
    emit_when: "When you have produced output that should be reviewed"

  review.complete:
    description: "Code review finished"
    payload:
      spec_id: "string"
      issues_found: "number"
      summary: "string"
    emit_when: "After completing a review task"

  # --- Health ---
  health.check:
    description: "Periodic health check result"
    payload:
      component: "string"
      status: "string"
      detail: "string or null"
    emit_when: "Emitted by health check policies"

  health.alert:
    description: "Health issue detected"
    payload:
      component: "string"
      severity: "string"
      message: "string"
    emit_when: "When a health check detects a problem"

  # --- Policy lifecycle ---
  policy.created:
    description: "A new policy was created (via LLM or manual)"
    payload:
      name: "string"
      source: "string (user, llm, system)"
    emit_when: "When a policy is added to the system"

  policy.denied:
    description: "A policy creation request was denied"
    payload:
      reason: "string"
      source_group: "string"
    emit_when: "When a policy request violates approval rules"

  # --- Self-improvement ---
  agent.skill.created:
    description: "An agent created a new skill via IPC"
    payload:
      group: "string - group that created the skill"
      skill_name: "string - name of the skill"
      scan_verdict: "string - security scan result (safe, caution)"
    emit_when: "After a skill passes security scanning and is written to disk"

  agent.skill.patched:
    description: "An agent patched an existing skill via IPC"
    payload:
      group: "string - group that patched the skill"
      skill_name: "string - name of the skill"
    emit_when: "After a skill patch passes security scanning and is applied"

  ops.skill.promoted:
    description: "Ops promoted a skill to all groups"
    payload:
      skill_name: "string - name of the promoted skill"
      from_group: "string - group that originally created it"
      promoted_to: "number - count of groups that received the skill"
    emit_when: "After ops copies a skill to all registered groups"
