name: test-chain
description: "Chains a new event when boi.spec.completed fires"
lifecycle: persistent
enabled: true
rules:
  - name: chain-on-boi
    trigger:
      event: "boi.spec.completed"
    conditions:
      - field: status
        op: eq
        value: "success"
    actions:
      - type: emit
        event: review.requested
        payload:
          spec_id: "{{ event.spec_id }}"
          source: "auto-chain"
